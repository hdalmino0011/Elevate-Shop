  --indigo: #1B2838;
  --indigo-light: #2A3F55;

  --terracotta: #C25D3A;
  --cream: #F7F5F0;

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif; background: var(--cream); color: var(--text); line-height: 1.7; }

.container { max-width: 800px; margin: 0 auto; padding: 20px; }
@media print { .no-print { display: none !important; } body { background: #fff; } }

.cover-inner { position: relative; padding: 80px 40px 60px; z-index: 1; }
.cover-kintsugi { width: 80px; height: 4px; background: var(--gold); margin: 0 auto 20px; border-radius: 2px; position: relative; }

.cover-kintsugi::after { content: ''; position: absolute; top: 4px; right: 15px; width: 30px; height: 2px; background: var(--gold); border-radius: 1px; transform: rotate(10deg); }

.cover h1 strong { font-weight: 600; color: var(--gold); }
.cover .subtitle { color: var(--gold-light); font-size: 1em; margin-bottom: 6px; letter-spacing: 2px; font-weight: 300; }
.cover .badge { display: inline-block; background: var(--terracotta); color: #fff; padding: 8px 28px; border-radius: 30px; font-size: 0.75em; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
.cover-footer { padding: 16px 40px; border-top: 1px solid rgba(201,168,76,0.12); display: flex; justify-content: center; gap: 36px; color: rgba(232,213,163,0.4); font-size: 0.7em; letter-spacing: 1px; text-transform: uppercase; }

.progress-bar { height: 6px; background: #E8E5E0; border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--indigo), var(--gold)); border-radius: 10px; transition: width 0.5s ease; width: 0%; }
.reset-btn { display: inline-block; margin-top: 12px; padding: 6px 18px; background: var(--danger); color: #fff; border: none; border-radius: 6px; font-size: 0.75em; cursor: pointer; font-family: 'Inter', sans-serif; }

.toc h2 { color: var(--indigo); font-size: 1.3em; margin-bottom: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }

.toc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 5px; }
.toc-item { display: flex; align-items: center; gap: 10px; padding: 5px 10px; border-radius: 6px; cursor: pointer; transition: all 0.2s; text-decoration: none; color: var(--text); font-size: 0.85em; }
.toc-item:hover { background: rgba(201,168,76,0.06); color: var(--indigo); }
.toc-num { width: 24px; height: 24px; background: var(--indigo); color: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65em; font-weight: 600; flex-shrink: 0; }
.toc-item.completed .toc-num { background: var(--success); color: #fff; }
.toc-item.completed::after { content: '\2713'; color: var(--success); font-weight: 700; margin-left: auto; }

.chapter { display: none; background: var(--card); border-radius: 16px; margin: 20px 0; box-shadow: 0 2px 25px rgba(0,0,0,0.03); overflow: hidden; border: 1px solid rgba(201,168,76,0.06); }
.chapter.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.ch-header { padding: 35px 45px 25px; border-bottom: 1px solid rgba(201,168,76,0.08); position: relative; }

.ch-subtitle { color: var(--text-light); font-size: 0.9em; font-style: italic; }

.ch-body { padding: 30px 45px; }
.ch-body p { margin-bottom: 14px; font-size: 1.05em; color: var(--text); }

.gold-line { width: 40px; height: 2px; background: var(--gold); margin: 20px 0; border-radius: 1px; }

.info-box { background: rgba(201,168,76,0.04); border-left: 3px solid var(--gold); padding: 18px 22px; margin: 18px 0; border-radius: 0 8px 8px 0; }

.quoteblock { margin: 18px 0; padding: 0 0 0 24px; border-left: 2px solid var(--terracotta); }

.quoteblock .qa { font-size: 0.8em; color: var(--text-light); margin-top: 2px; }

.exercise { background: linear-gradient(135deg, rgba(201,168,76,0.03), rgba(194,93,58,0.02)); border-radius: 12px; padding: 24px; margin: 24px 0; border: 1px solid rgba(201,168,76,0.1); }

.yt-wrap { margin: 24px 0; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

.save-field { width: 100%; background: rgba(255,255,255,0.5); border: 1px solid rgba(201,168,76,0.12); border-radius: 8px; padding: 12px 14px; font-family: 'Cormorant Garamond', serif; font-size: 0.95em; color: var(--text); resize: vertical; transition: all 0.2s; }
.save-field:focus { outline: none; border-color: var(--gold); background: rgba(255,255,255,0.8); }

.nav-bar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 20px; padding: 16px 45px 35px; }
.nav-btn { padding: 10px 24px; background: transparent; color: var(--indigo); border: 1px solid var(--indigo); border-radius: 8px; font-size: 0.85em; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
.nav-btn:hover { background: var(--indigo); color: #fff; }
.nav-btn:disabled { opacity: 0.3; cursor: default; background: transparent; color: var(--text-light); border-color: var(--text-light); }
.nav-center { font-size: 0.85em; color: var(--text-light); font-family: 'Inter', sans-serif; }

.complete-section { text-align: center; padding: 0 45px 10px; }
.complete-btn { padding: 12px 40px; background: var(--gold); color: var(--indigo); border: none; border-radius: 8px; font-size: 0.9em; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; letter-spacing: 0.5px; }

@media (max-width: 600px) {
  .cover h1 { font-size: 1.8em; }
  .ch-header { padding: 25px 20px; }
  .ch-body { padding: 20px; }
  .yt-wrap iframe { height: 200px; }
  .nav-btn { padding: 8px 14px; font-size: 0.75em; }
  .cover-footer { flex-wrap: wrap; gap: 12px; }
}
</style>
</head>

const storageKey = PREFIX + 'progress';

function getProgress() {
  try { return JSON.parse(localStorage.getItem(storageKey)) || { completed: [], data: {} }; } catch { return { completed: [], data: {} }; }
}
function saveProgress(p) {
  localStorage.setItem(storageKey, JSON.stringify(p));
}

function render() {
  let p = getProgress();
  let total = CH.length;
  let done = p.completed.length;

  // TOC
  let tg = document.getElementById('tocGrid');
  tg.innerHTML = '';
  CH.forEach(c => {
    let a = document.createElement('a');
    a.className = 'toc-item' + (p.completed.includes(c.n) ? ' completed' : '');
    a.href = '#';
    a.dataset.ch = c.n;
    a.innerHTML = '<span class="toc-num">' + c.n + '</span> ' + c.t;
    a.onclick = (e) => { e.preventDefault(); showCh(c.n); };
    tg.appendChild(a);
  });

  document.getElementById('progressPct').textContent = Math.round(done/total*100) + '%';
  document.getElementById('progressFill').style.width = (done/total*100) + '%';

  let container = document.getElementById('chaptersContainer');
  container.innerHTML = '';
  CH.forEach(c => {
    let ct = CONTENT[c.n];
    let yt = YT[c.n];
    let div = document.createElement('div');
    div.className = 'chapter';
    div.id = 'ch-' + c.n;

    let ytHtml = yt ? '<div class="yt-wrap"><iframe src="https://www.youtube.com/embed/' + yt + '" allowfullscreen loading="lazy"></iframe></div>' : '';
    let paras = ct.p.map(p => '<p>' + p + '</p>').join('');
    let quotes = ct.q.map(q => '<div class="quoteblock"><p class="qt">' + q[0] + '</p><p class="qa">' + q[1] + '</p></div>').join('');
    let exHtml = '<div class="exercise"><h4>Your Reflection</h4><textarea class="save-field" data-key="ch' + c.n + '-ex" placeholder="Write your reflection here...">' + (p.data['ch' + c.n + '-ex'] || '') + '</textarea></div>';

    div.innerHTML = `
      <div class="ch-header">
        <div class="ch-number">Chapter ` + c.n + `</div>
        <h2>` + c.t + `</h2>
        <p class="ch-subtitle">` + c.s + `</p>
      </div>
      <div class="ch-body">
        ` + ytHtml + `
        ` + paras + `
        <div class="gold-line"></div>
        ` + quotes + `
        ` + exHtml + `
        <div class="complete-section">
          <button class="complete-btn" onclick="toggleCh(` + c.n + `)">` + (p.completed.includes(c.n) ? '\u2713 Completed' : 'Mark Complete') + `</button>
        </div>
        <div class="nav-bar">
          <button class="nav-btn" onclick="prevCh()"` + (c.n == 1 ? ' disabled' : '') + `>\u2190 Previous</button>
          <span class="nav-center">` + c.n + ` of ` + total + `</span>
          <button class="nav-btn" onclick="nextCh()"` + (c.n == total ? ' disabled' : '') + `>Next \u2192</button>
        </div>
      </div>
    `;
    container.appendChild(div);
  });

  showCh(1);
  loadSaved();
}

let currentCh = 1;

function showCh(n) {
  document.querySelectorAll('.chapter').forEach(c => c.classList.remove('active'));
  let el = document.getElementById('ch-' + n);
  if (el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  currentCh = n;
  window.location.hash = 'ch-' + n;
}

function nextCh() { if (currentCh < CH.length) showCh(currentCh + 1); }
function prevCh() { if (currentCh > 1) showCh(currentCh - 1); }

function toggleCh(n) {
  let p = getProgress();
  let idx = p.completed.indexOf(n);
  if (idx > -1) { p.completed.splice(idx, 1); } else { p.completed.push(n); }
  saveProgress(p);
  render();
}

function loadSaved() {
  document.querySelectorAll('.save-field').forEach(el => {
    el.addEventListener('input', function() {
      let pp = getProgress();
      pp.data[this.dataset.key] = this.value;
      saveProgress(pp);
    });
  });
}

function resetAll() {
  if (!confirm('Reset all progress? This will erase all completed chapters and saved reflections.')) return;
  localStorage.removeItem(storageKey);
  location.reload();
}

window.addEventListener('hashchange', function() {
  let m = window.location.hash.match(/ch-(\d+)/);
  if (m) { let n = parseInt(m[1]); if (n >= 1 && n <= CH.length) showCh(n); }
});

render();
</script>
