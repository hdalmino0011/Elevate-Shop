<style>
:root {
  --lavender: #7B6FA0;
  --blush: #E8A87C;
  --cream: #FCFAF5;
  --warm: #F5F0EB;
  --charcoal: #3D3440;
  --muted: #8A7E8A;
  --card: #FFFFFF;
  --success: #7FA88C;
  --danger: #C9706E;
  --gold: #D4A76A;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--cream); color: var(--charcoal); line-height: 1.7; }
h1, h2, h3, .ch-body p, .qt { font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif; }
h2 { font-weight: 600; }
.container { max-width: 780px; margin: 0 auto; padding: 20px; }
@media print { .no-print { display: none !important; } }

/* Cover */
.cover { background: linear-gradient(150deg, #6B5B95 0%, #7B6FA0 30%, #B8A9C9 70%, #E8DCD1 100%); padding: 0; text-align: center; border-radius: 0 0 20px 20px; position: relative; overflow: hidden; }
.cover::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 30%, rgba(232,168,124,0.06) 0%, transparent 50%); }
.cover-inner { padding: 70px 40px 50px; position: relative; z-index: 1; }
.cover-icon { font-size: 2.5em; margin-bottom: 10px; display: block; color: rgba(255,255,255,0.3); letter-spacing: 8px; }
.cover h1 { color: #fff; font-size: 3em; font-weight: 300; letter-spacing: 2px; margin-bottom: 6px; text-shadow: 0 2px 15px rgba(0,0,0,0.1); }
.cover h1 strong { font-weight: 700; color: var(--blush); }
.cover .subtitle { color: rgba(255,255,255,0.7); font-size: 1em; margin-bottom: 4px; font-family: 'Inter', sans-serif; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; }
.cover .badge { display: inline-block; background: rgba(255,255,255,0.15); backdrop-filter: blur(4px); color: #fff; padding: 6px 24px; border-radius: 20px; font-size: 0.7em; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; margin-top: 16px; border: 1px solid rgba(255,255,255,0.1); }
.cover-footer { padding: 14px 40px; display: flex; justify-content: center; gap: 28px; color: rgba(255,255,255,0.35); font-size: 0.65em; letter-spacing: 1px; text-transform: uppercase; background: rgba(0,0,0,0.08); }

/* Progress */
.progress-section { background: var(--card); border-radius: 14px; padding: 18px 26px; margin: 20px 0; box-shadow: 0 2px 12px rgba(0,0,0,0.03); }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-header h3 { font-size: 0.85em; color: var(--charcoal); font-weight: 600; font-family: 'Inter', sans-serif; }
.progress-header span { font-weight: 700; color: var(--blush); font-size: 0.9em; }
.progress-bar { height: 5px; background: #EDE8E4; border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--lavender), var(--blush)); border-radius: 10px; transition: width 0.5s; width: 0%; }
.reset-btn { margin-top: 10px; padding: 5px 16px; background: var(--danger); color: #fff; border: none; border-radius: 6px; font-size: 0.7em; cursor: pointer; font-family: 'Inter', sans-serif; }
.reset-btn:hover { opacity: 0.85; }

/* TOC */
.toc { background: var(--card); border-radius: 14px; padding: 26px 30px; margin: 20px 0; box-shadow: 0 2px 12px rgba(0,0,0,0.03); }
.toc h2 { font-size: 1.2em; margin-bottom: 14px; color: var(--charcoal); font-family: 'Inter', sans-serif; }
.toc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 4px; }
.toc-item { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.82em; color: var(--charcoal); text-decoration: none; }
.toc-item:hover { background: var(--warm); }
.toc-num { width: 22px; height: 22px; background: var(--lavender); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6em; font-weight: 600; flex-shrink: 0; }
.toc-item.completed .toc-num { background: var(--success); }
.toc-item.completed::after { content: '\2713'; color: var(--success); font-weight: 700; margin-left: auto; }

/* Chapter */
.chapter { display: none; background: var(--card); border-radius: 16px; margin: 20px 0; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.03); }
.chapter.active { display: block; animation: fadeIn 0.35s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.ch-head { padding: 32px 40px 22px; background: linear-gradient(135deg, #FCFAF5, #F5F0EB); border-bottom: 1px solid #EDE8E4; }
.ch-num { color: var(--lavender); font-size: 0.6em; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; font-family: 'Inter', sans-serif; }
.ch-head h2 { color: var(--charcoal); font-size: 1.6em; margin: 2px 0 4px; letter-spacing: -0.3px; }
.ch-sub { color: var(--muted); font-size: 0.85em; font-style: italic; }

.ch-body { padding: 28px 40px; }
.ch-body p { font-size: 1.08em; margin-bottom: 14px; color: var(--charcoal); }

/* Quote */
.qb { margin: 16px 0; padding: 0 0 0 22px; border-left: 2px solid var(--blush); }
.qb .qt { font-size: 1.05em; font-style: italic; color: var(--charcoal); }
.qb .qa { font-size: 0.8em; color: var(--muted); margin-top: 1px; }

/* Exercise */
.ex { background: var(--warm); border-radius: 12px; padding: 22px 24px; margin: 22px 0; border: 1px solid #EDE8E4; }
.ex h4 { font-size: 0.75em; color: var(--lavender); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-family: 'Inter', sans-serif; }
.ex h4::before { content: '\2726\00A0'; }
.ex textarea { width: 100%; background: #fff; border: 1px solid #E2DCD6; border-radius: 8px; padding: 12px; font-family: 'Cormorant Garamond', serif; font-size: 1em; color: var(--charcoal); resize: vertical; min-height: 60px; }
.ex textarea:focus { outline: none; border-color: var(--lavender); }

/* YouTube */
.yt-wrap { margin: 20px 0; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
.yt-wrap iframe { width: 100%; height: 380px; border: none; display: block; }

/* Nav */
.nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding: 10px 0 24px; }
.nav-btn { padding: 8px 20px; background: transparent; color: var(--charcoal); border: 1px solid #D4CCC8; border-radius: 8px; font-size: 0.8em; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; }
.nav-btn:hover { background: var(--lavender); color: #fff; border-color: var(--lavender); }
.nav-btn:disabled { opacity: 0.25; cursor: default; background: transparent; color: var(--muted); border-color: #E2DCD6; }
.nav-center { font-size: 0.8em; color: var(--muted); font-family: 'Inter', sans-serif; }

.complete-wrap { text-align: center; padding-top: 6px; }
.complete-btn { padding: 10px 36px; background: var(--lavender); color: #fff; border: none; border-radius: 8px; font-size: 0.85em; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
.complete-btn:hover { background: var(--blush); }
.complete-btn.done { background: var(--success); }

@media (max-width: 600px) {
  .cover h1 { font-size: 2em; }
  .ch-head { padding: 24px 20px; }
  .ch-body { padding: 20px; }
  .yt-wrap iframe { height: 200px; }
}
</style>

function build() {
  let s = load();
  let total = CH.length;
  let done = s.c.length;

  let tg = document.getElementById('tocGrid');
  tg.innerHTML = CH.map((c,i) => '<a class="toc-item'+(s.c.includes(i+1)?' completed':'')+'" data-n="'+(i+1)+'"><span class="toc-num">'+(i+1)+'</span>'+c.t+'</a>').join('');
  tg.querySelectorAll('.toc-item').forEach(a => a.onclick = function(e) { e.preventDefault(); show(parseInt(this.dataset.n)); });

  document.getElementById('pct').textContent = Math.round(done/total*100)+'%';
  document.getElementById('fill').style.width = (done/total*100)+'%';

  let ct = document.getElementById('container');
  ct.innerHTML = '';
  CH.forEach((c,i) => {
    let n = i+1;
    let yt = YT[n];
    let qs = C[n] || [];
    let yth = yt ? '<div class="yt-wrap"><iframe src="https://www.youtube.com/embed/'+yt+'" allowfullscreen loading="lazy"></iframe></div>' : '';
    let qh = qs.map(q => '<div class="qb"><p class="qt">\u201C'+q[0]+'\u201D</p><p class="qa">'+q[1]+'</p></div>').join('');
    let val = s.d['ch'+n] || '';

    let html = '<div class="chapter" id="ch'+n+'">'
      + '<div class="ch-head"><div class="ch-num">Chapter '+n+'</div><h2>'+c.t+'</h2><p class="ch-sub">\u201C'+c.s+'\u201D</p></div>'
      + '<div class="ch-body">'
      + yth + qh
      + '<div class="ex"><h4>Morning Exercise</h4><textarea class="ex-ta" data-n="'+n+'" placeholder="Write your reflections, insights, or morning plan here...">'+val+'</textarea></div>'
      + '<div class="complete-wrap"><button class="complete-btn'+(s.c.includes(n)?' done':'')+'" onclick="toggle('+n+')">'+(s.c.includes(n)?'\u2713 Completed':'Mark Complete')+'</button></div>'
      + '<div class="nav-bar">'
      + '<button class="nav-btn" onclick="prev()"'+(n===1?' disabled':'')+'>\u2190 Previous</button>'
      + '<span class="nav-center">'+n+' of '+total+'</span>'
      + '<button class="nav-btn" onclick="next()"'+(n===total?' disabled':'')+'>Next \u2192</button>'
      + '</div></div></div>';
    ct.innerHTML += html;
  });

  document.querySelectorAll('.chapter').forEach(d => d.classList.remove('active'));
  let f = document.getElementById('ch1');
  if (f) f.classList.add('active');

  document.querySelectorAll('.ex-ta').forEach(ta => {
    ta.addEventListener('input', function() {
      let ss = load();
      ss.d['ch'+this.dataset.n] = this.value;
      save(ss);
    });
  });
}

let cur = 1;
window.show = function(n) {
  document.querySelectorAll('.chapter').forEach(d => d.classList.remove('active'));
  let el = document.getElementById('ch'+n);
  if (el) { el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'start'}); }
  cur = n;
};
window.next = function() { if (cur < CH.length) show(cur+1); };
window.prev = function() { if (cur > 1) show(cur-1); };
function toggle(n) {
  let s = load();
  let idx = s.c.indexOf(n);
  if (idx > -1) { s.c.splice(idx,1); } else { s.c.push(n); }
  save(s);
  build();
  show(n);
}
window.toggle = toggle;
window.resetAll = function() {
  if (!confirm('Reset all progress?')) return;
  localStorage.removeItem(KEY);
  location.reload();
};
build();
})();
</script>
</body>
