<style>
:root {
  --deep: #0F172A;
  --navy: #1E293B;
  --sunrise: #F59E0B;
  --amber: #D97706;
  --orange: #EA580C;
  --light: #FFF7ED;
  --text: #1C1917;
  --muted: #78716C;
  --card: #FFFFFF;
  --success: #10B981;
  --danger: #EF4444;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--light); color: var(--text); line-height: 1.7; }
.container { max-width: 800px; margin: 0 auto; padding: 20px; }
@media print { .no-print { display: none !important; } }

/* Cover */
.cover { background: linear-gradient(135deg, var(--deep) 0%, var(--navy) 50%, #312E81 100%); padding: 0; text-align: center; border-radius: 0 0 16px 16px; position: relative; overflow: hidden; }
.cover::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--sunrise), var(--orange), var(--sunrise)); }
.cover-inner { padding: 70px 40px 50px; position: relative; z-index: 1; }
.cover-sun { width: 60px; height: 60px; background: radial-gradient(circle, var(--sunrise), var(--amber)); border-radius: 50%; margin: 0 auto 20px; box-shadow: 0 0 40px rgba(245,158,11,0.3); }
.cover h1 { color: #fff; font-size: 2.6em; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
.cover h1 span { color: var(--sunrise); }
.cover .subtitle { color: #94A3B8; font-size: 1em; margin-bottom: 4px; }
.cover .badge { display: inline-block; background: var(--orange); color: #fff; padding: 6px 24px; border-radius: 20px; font-size: 0.75em; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 16px; }
.cover-footer { padding: 14px 40px; display: flex; justify-content: center; gap: 32px; color: rgba(148,163,184,0.5); font-size: 0.7em; letter-spacing: 1px; text-transform: uppercase; background: rgba(0,0,0,0.2); }

/* Progress */
.progress-section { background: var(--card); border-radius: 12px; padding: 20px 28px; margin: 20px 0; box-shadow: 0 1px 8px rgba(0,0,0,0.04); }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-header h3 { font-size: 0.85em; color: var(--text); font-weight: 600; }
.progress-header span { font-weight: 700; color: var(--orange); font-size: 0.9em; }
.progress-bar { height: 6px; background: #E2E8F0; border-radius: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--sunrise), var(--orange)); border-radius: 10px; transition: width 0.5s; width: 0%; }
.reset-btn { margin-top: 10px; padding: 5px 16px; background: var(--danger); color: #fff; border: none; border-radius: 6px; font-size: 0.7em; cursor: pointer; }
.reset-btn:hover { opacity: 0.85; }

/* TOC */
.toc { background: var(--card); border-radius: 12px; padding: 28px; margin: 20px 0; box-shadow: 0 1px 8px rgba(0,0,0,0.04); }
.toc h2 { font-size: 1.2em; margin-bottom: 16px; font-weight: 600; color: var(--deep); }
.toc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 4px; }
.toc-item { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.82em; color: var(--text); text-decoration: none; }
.toc-item:hover { background: #FFF7ED; }
.toc-num { width: 22px; height: 22px; background: var(--navy); color: var(--sunrise); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6em; font-weight: 600; flex-shrink: 0; }
.toc-item.completed .toc-num { background: var(--success); color: #fff; }
.toc-item.completed::after { content: '\2713'; color: var(--success); font-weight: 700; margin-left: auto; }

/* Day */
.day { display: none; background: var(--card); border-radius: 16px; margin: 20px 0; box-shadow: 0 1px 12px rgba(0,0,0,0.04); overflow: hidden; }
.day.active { display: block; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.d-head { background: linear-gradient(135deg, var(--deep), var(--navy)); padding: 32px 40px 24px; }
.d-num { color: var(--sunrise); font-size: 0.65em; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; }
.d-head h2 { color: #fff; font-size: 1.5em; margin: 4px 0; font-weight: 700; }
.d-theme { color: #94A3B8; font-size: 0.85em; font-style: italic; }

.d-body { padding: 28px 40px; }

/* Quote card */
.qc { padding: 12px 16px 12px 20px; border-left: 3px solid var(--sunrise); margin-bottom: 8px; background: rgba(245,158,11,0.02); border-radius: 0 6px 6px 0; }
.qc:last-child { margin-bottom: 0; }
.qc .qt { font-size: 0.95em; color: var(--text); line-height: 1.6; }
.qc .qa { font-size: 0.78em; color: var(--muted); margin-top: 2px; }

/* Divider */
.dd { text-align: center; margin: 24px 0; color: var(--sunrise); font-size: 0.75em; letter-spacing: 4px; opacity: 0.3; }

/* Reflection */
.ref { margin-top: 20px; padding: 20px; background: #FFF7ED; border-radius: 10px; border: 1px solid rgba(245,158,11,0.1); }
.ref h3 { font-size: 0.8em; color: var(--amber); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.ref textarea { width: 100%; background: #fff; border: 1px solid #E2E8F0; border-radius: 8px; padding: 12px; font-family: 'Inter', sans-serif; font-size: 0.9em; color: var(--text); resize: vertical; min-height: 60px; }
.ref textarea:focus { outline: none; border-color: var(--sunrise); }

/* Challenge */
.chal { margin-top: 16px; padding: 16px 20px; background: linear-gradient(135deg, rgba(245,158,11,0.04), rgba(234,88,12,0.02)); border-radius: 10px; border: 1px solid rgba(245,158,11,0.1); }
.chal-label { display: inline-block; background: var(--orange); color: #fff; padding: 2px 12px; border-radius: 12px; font-size: 0.65em; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.chal p { font-size: 0.9em; color: var(--text); }

/* YouTube */
.yt-wrap { margin: 20px 0; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.yt-wrap iframe { width: 100%; height: 380px; border: none; display: block; }

/* Nav */
.nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding: 12px 0 28px; }
.nav-btn { padding: 8px 20px; background: transparent; color: var(--navy); border: 1px solid var(--navy); border-radius: 8px; font-size: 0.8em; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; }
.nav-btn:hover { background: var(--navy); color: #fff; }
.nav-btn:disabled { opacity: 0.25; cursor: default; background: transparent; color: var(--muted); border-color: #D1D5DB; }
.nav-center { font-size: 0.8em; color: var(--muted); }

.complete-wrap { text-align: center; padding-top: 8px; }
.complete-btn { padding: 10px 36px; background: var(--sunrise); color: var(--deep); border: none; border-radius: 8px; font-size: 0.85em; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
.complete-btn:hover { background: var(--amber); color: #fff; }
.complete-btn.done { background: var(--success); color: #fff; }

@media (max-width: 600px) {
  .cover h1 { font-size: 1.8em; }
  .d-head { padding: 24px 20px; }
  .d-body { padding: 20px; }
  .yt-wrap iframe { height: 200px; }
}
</style>

function build() {
  let s = load();
  let total = DAYS.length;
  let done = s.c.length;

  // TOC
  let tg = document.getElementById('tocGrid');
  tg.innerHTML = DAYS.map((d,i) => '<a class="toc-item'+(s.c.includes(i+1)?' completed':'')+'" href="#" data-n="'+(i+1)+'"><span class="toc-num">'+(i+1)+'</span> Day '+(i+1)+': '+d.t+'</a>').join('');
  tg.querySelectorAll('.toc-item').forEach(a => a.onclick = function(e) { e.preventDefault(); show(parseInt(this.dataset.n)); });

  document.getElementById('pct').textContent = Math.round(done/total*100)+'%';
  document.getElementById('fill').style.width = (done/total*100)+'%';

  // Days
  let c = document.getElementById('container');
  c.innerHTML = '';
  DAYS.forEach((d,i) => {
    let n = i+1;
    let q = Q[n] || [];
    let yt = YT_LINKS[n];
    let ch = CHALLENGES[i];
    let qhtml = '';
    for (let j = 0; j < q.length; j += 2) {
      qhtml += '<div class="qc"><p class="qt">\u201C' + q[j] + '\u201D</p><p class="qa">' + q[j+1] + '</p></div>';
    }
    let ythtml = yt ? '<div class="yt-wrap"><iframe src="https://www.youtube.com/embed/'+yt+'" allowfullscreen loading="lazy"></iframe></div>' : '';
    let val = s.d['day'+n] || '';
    let doneClass = s.c.includes(n) ? ' done' : '';
    let btnText = s.c.includes(n) ? '\u2713 Completed' : 'Mark Complete';

    let html = '<div class="day" id="day'+n+'">'
      + '<div class="d-head"><div class="d-num">Day '+n+'</div><h2>'+d.t+'</h2><p class="d-theme">\u201C'+d.s+'\u201D</p></div>'
      + '<div class="d-body">'
      + ythtml
      + qhtml
      + '<div class="dd">\u25C6 \u25C6 \u25C6</div>'
      + '<div class="ref"><h3>Your Reflection</h3><textarea id="ref'+n+'" class="ref-ta" data-n="'+n+'" placeholder="What resonated most with you today?">'+val+'</textarea></div>'
      + '<div class="chal"><span class="chal-label">Daily Challenge</span><p>\u25B6 '+ch+'</p></div>'
      + '<div class="complete-wrap"><button class="complete-btn'+doneClass+'" onclick="toggle('+n+')" id="btn'+n+'">'+btnText+'</button></div>'
      + '<div class="nav-bar">'
      + '<button class="nav-btn" onclick="prev()"'+(n===1?' disabled':'')+'>\u2190 Previous</button>'
      + '<span class="nav-center">Day '+n+' of '+total+'</span>'
      + '<button class="nav-btn" onclick="next()"'+(n===total?' disabled':'')+'>Next \u2192</button>'
      + '</div></div></div>';
    c.innerHTML += html;
  });

  // Hide all, show first
  document.querySelectorAll('.day').forEach(d => d.classList.remove('active'));
  let first = document.getElementById('day1');
  if (first) first.classList.add('active');

  // Load saved reflections
  document.querySelectorAll('.ref-ta').forEach(ta => {
    ta.addEventListener('input', function() {
      let ss = load();
      ss.d['day'+this.dataset.n] = this.value;
      save(ss);
    });
  });
}

let cur = 1;
window.show = function(n) {
  document.querySelectorAll('.day').forEach(d => d.classList.remove('active'));
  let el = document.getElementById('day'+n);
  if (el) { el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'start'}); }
  cur = n;
};
window.next = function() { if (cur < DAYS.length) show(cur+1); };
window.prev = function() { if (cur > 1) show(cur-1); };

function toggle(n) {
  let s = load();
  let idx = s.c.indexOf(n);
  if (idx > -1) { s.c.splice(idx,1); } else { s.c.push(n); }
  save(s);
  build();
  show(n);
}
window.toggle = toggle;

window.resetAll = function() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  localStorage.removeItem(STORE);
  location.reload();
};

build();
})();
</script>
</body>
